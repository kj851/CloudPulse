name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v2.1.3

permissions:
  contents: write  # needed to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pillow

      - name: Build exe
        run: |
          pyinstaller CloudPulse.spec

      - name: Zip the exe
        run: |
          Compress-Archive -Path dist\CloudPulse.exe -DestinationPath CloudPulse-Windows.zip

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudPulse-Windows
          path: CloudPulse-Windows.zip

  build-mac:
    name: Build macOS .app
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip3 install pyinstaller pillow

      - name: Install tkinter
        run: brew install python-tk

      - name: Build .app
        run: |
          pyinstaller CloudPulse.spec

      - name: Zip the .app
        run: |
          zip -r CloudPulse-Mac.zip dist/CloudPulse.app

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudPulse-Mac
          path: CloudPulse-Mac.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CloudPulse-Windows

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: CloudPulse-Mac

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: CloudPulse ${{ github.ref_name }}
          body: |
            ## CloudPulse ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | Windows | `CloudPulse-Windows.zip` | Extract and run `CloudPulse.exe` |
            | macOS | `CloudPulse-Mac.zip` | Extract and run `CloudPulse.app` |

            ### Requirements
            - **R 4.4+** must be installed separately — [download here](https://cran.r-project.org)
            - Run `Rscript install_R_packages.R` once before first launch

            ### First Run
            1. Install R from the link above
            2. Run `Rscript install_R_packages.R` in the project folder
            3. Launch `CloudPulse.exe` (Windows) or `CloudPulse.app` (macOS)
          files: |
            CloudPulse-Windows.zip
            CloudPulse-Mac.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
