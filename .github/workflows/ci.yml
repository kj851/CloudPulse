name: CloudPulse CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R_LIBS_USER: ${{ github.workspace }}/.r-lib

jobs:
  lint-r:
    name: Lint R code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libssl-dev libcurl4-openssl-dev libxml2-dev libpq-dev \
            libcairo2-dev libxt-dev libharfbuzz-dev libfribidi-dev \
            libfontconfig1-dev libfreetype6-dev

      - name: Create R library dir
        run: mkdir -p ${{ github.workspace }}/.r-lib

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.r-lib
          key: r-lint-4.6-${{ hashFiles('install_R_packages.R') }}
          restore-keys: r-lint-4.6-

      - name: Install shiny + lintr
        run: |
          Rscript -e "
            lib <- Sys.getenv('R_LIBS_USER')
            dir.create(lib, recursive = TRUE, showWarnings = FALSE)
            .libPaths(c(lib, .libPaths()))
            pkgs <- c('shiny', 'lintr')
            to_install <- pkgs[!pkgs %in% installed.packages()[,'Package']]
            if (length(to_install) > 0) {
              install.packages(to_install,
                lib = lib,
                repos = 'https://packagemanager.posit.co/cran/__linux__/noble/latest')
            }
          "

      - name: Lint all R files
        run: |
          Rscript -e "
            .libPaths(c(Sys.getenv('R_LIBS_USER'), .libPaths()))
            library(lintr)
            files <- c(
              'lib/FInOpsApp.R',
              'lib/data/daws.r', 'lib/data/azure.r',
              'lib/data/GCP.r', 'lib/data/mock.r', 'lib/data/forecast.r'
            )
            results <- lint_files(files)
            if (length(results) > 0) {
              print(results)
              errors <- Filter(function(x) x\$type == 'error', results)
              if (length(errors) > 0) quit(status = 1)
            } else {
              cat('No lint issues found\n')
            }
          "

  check-r:
    name: Check R ${{ matrix.r-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r-version: ['4.4', '4.5', '4.6']

    env:
      R_LIBS_USER: ${{ github.workspace }}/.r-lib

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libssl-dev libcurl4-openssl-dev libxml2-dev libpq-dev \
            libcairo2-dev libxt-dev libharfbuzz-dev libfribidi-dev \
            libgdal-dev libproj-dev libudunits2-dev libsodium-dev \
            libfontconfig1-dev libfreetype6-dev

      - name: Create R library dir
        run: mkdir -p ${{ github.workspace }}/.r-lib

      - name: Cache R packages
        id: cache-r
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.r-lib
          key: r-${{ matrix.r-version }}-${{ hashFiles('install_R_packages.R') }}
          restore-keys: r-${{ matrix.r-version }}-

      - name: Install R packages
        run: |
          Rscript -e "
            lib <- Sys.getenv('R_LIBS_USER')
            dir.create(lib, recursive = TRUE, showWarnings = FALSE)
            .libPaths(c(lib, .libPaths()))
            cat('Library path:', lib, '\n')
            cat('libPaths:', paste(.libPaths(), collapse=', '), '\n')
          "
          Rscript setup/install_R_packages.R

      - name: Verify key packages installed
        run: |
          Rscript -e "
            .libPaths(c(Sys.getenv('R_LIBS_USER'), .libPaths()))
            required <- c('shiny','bslib','plotly','DT','dplyr','ggplot2','forecast','shinycssloaders')
            missing  <- required[!required %in% installed.packages()[,'Package']]
            if (length(missing) > 0) {
              cat('MISSING packages:', paste(missing, collapse=', '), '\n')
              install.packages(missing,
                repos='https://packagemanager.posit.co/cran/__linux__/noble/latest')
            } else {
              cat('All required packages present\n')
            }
          "

      - name: Syntax check all R files
        run: |
          Rscript -e "
            .libPaths(c(Sys.getenv('R_LIBS_USER'), .libPaths()))
            files <- c(
              'lib/FInOpsApp.R',
              'lib/data/aws.r', 'lib/data/azure.r',
              'lib/data/GCP.r', 'lib/data/mock.r', 'lib/data/forecast.r'
            )
            ok <- TRUE
            for (f in files) {
              tryCatch({
                parse(f)
                cat('PASS:', f, '\n')
              }, error = function(e) {
                cat('FAIL:', f, '-', e\$message, '\n')
                ok <<- FALSE
              })
            }
            if (!ok) quit(status = 1)
          "

      - name: Check Shiny modules load
        run: |
          Rscript -e "
            .libPaths(c(Sys.getenv('R_LIBS_USER'), .libPaths()))
            setwd('lib/data')
            source('aws.r')
            source('azure.r')
            source('GCP.r')
            source('mock.r')
            source('forecast.r')
            cat('All modules loaded successfully\n')
          "